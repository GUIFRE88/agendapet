services:
  web:
    build: .
    container_name: agendapet-ruby
    ports:
      - "3000:3000"
    volumes:
      # Bind da pasta atual para permitir criar Rails app
      - .:/app
      # Cache do bundle para acelerar builds
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - BUNDLE_PATH=/usr/local/bundle
    working_dir: /app
    # Manter container rodando para permitir execução de comandos
    tty: true
    stdin_open: true
    # Comando padrão para manter container ativo
    command: tail -f /dev/null

  # Serviço opcional para PostgreSQL (caso queira usar)
  db:
    image: postgres:15
    container_name: agendapet-postgres
    environment:
      POSTGRES_DB: agendapet_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  bundle_cache:
  postgres_data:
